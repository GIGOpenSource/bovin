<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <!-- CSP：生产建议由反向代理收紧 connect-src。K 线数据经同源 /panel/* 转发，无需浏览器直连交易所，故省略 unsafe-eval（TradingView LWC v4 standalone 亦不依赖 eval）。 -->
    <!-- connect-src 含 http: 便于局域网访问 :19090 代理；生产请改为仅 self 或固定上游 -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https: http: ws: wss: http://127.0.0.1:* http://localhost:*; img-src 'self' data: blob:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Bovin AI 量化交易系统：本地化部署，本机核心与面板协同；策略、数据与偏好默认仅存于本机。"
    />
    <meta property="og:title" content="Bovin · AI 量化交易系统" />
    <meta property="og:description" content="本地化运维与观测：无云端托管，数据与能力以本机为主。" />
    <meta property="og:type" content="website" />
    <meta name="panel-version" content="1.0.0" />
    <title>Bovin · AI 量化交易系统</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect fill="%2326a69a" width="32" height="32" rx="6"/></svg>' />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-card">
        <div class="login-title" data-i18n="login.title">Bovin</div>
        <div class="login-sub" data-i18n="login.sub">面板登录</div>
        <label><span data-i18n="login.username">用户名</span><input id="loginUsername" name="username" type="text" autocomplete="username" required /></label>
        <label><span data-i18n="login.password">密码</span><input id="loginPassword" name="password" type="password" autocomplete="current-password" required /></label>
        <button type="submit" class="primary" data-i18n="login.submit">登录</button>
        <div id="loginError" class="login-error"></div>
      </form>
    </div>

    <div id="app"></div>

    <script defer src="./main.js"></script>
  </body>
</html>
